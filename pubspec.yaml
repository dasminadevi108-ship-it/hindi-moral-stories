name: hindi_moral_stories
description: A mobile app for animated Hindi moral stories.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  google_fonts: ^5.1.0
  video_player: ^2.7.0
  firebase_core: ^2.20.0
  firebase_auth: ^4.10.0
  firebase_storage: ^11.4.0
  cloud_firestore: ^4.13.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/stories.json

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700